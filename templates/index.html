<!DOCTYPE html>
<html>
<head>
    <title>Cat Feeder Live Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">🐈 เครื่องให้อาหารแมว Simulator</h1>
        
        <div class="bg-slate-800 text-white p-4 rounded-lg mb-6 shadow-inner text-center">
            <p class="text-xs text-slate-400 uppercase tracking-wider">สถานะล่าสุดของเครื่อง</p>
            <p class="text-xl font-semibold mt-1" id="system-log">กำลังโหลด...</p>
            <p class="text-sm text-amber-400 mt-2">แมวที่กำลังกิน: <span id="active-cat">-</span></p>
            
            <div class="mt-3 max-w-xs mx-auto bg-slate-700 rounded-full h-4 overflow-hidden border border-slate-600">
                <div id="food-bar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-xs text-slate-300 mt-1">ปริมาณอาหารในจาน: <span id="food-text">0%</span></p>
        </div>

        <h2 class="text-xl font-bold text-slate-700 mb-3">📋 รายชื่อแมวและสิทธิ์การกินวันนี้</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-200 text-slate-600 uppercase text-sm">
                        <th class="p-3">รหัส Tag</th>
                        <th class="p-3">ชื่อแมว</th>
                        <th class="p-3">สถานะ</th>
                        <th class="p-3">เวลากินล่าสุด</th>
                    </tr>
                </thead>
                <tbody id="cats-table-body"></tbody>
            </table>
        </div>
        
        <div class="mt-8 text-center">
            <button onclick="resetSystem()" class="bg-rose-500 hover:bg-rose-600 text-white font-semibold py-2 px-6 rounded-lg transition shadow">
                🔄 รีเซ็ตสถานะการกิน (เริ่มต้นวันใหม่)
            </button>
        </div>
    </div>

    <script>
        function updateDashboard() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('system-log').innerText = data.system_log;
                    document.getElementById('active-cat').innerText = data.current_active_cat;
                    
                    document.getElementById('food-bar').style.width = data.food_level + '%';
                    document.getElementById('food-text').innerText = data.food_level + '%';
                    
                    if(data.food_level > 0) {
                        document.getElementById('food-bar').className = "bg-amber-500 h-full transition-all duration-500";
                    } else {
                        document.getElementById('food-bar').className = "bg-slate-500 h-full transition-all duration-500";
                    }

                    let tableBody = '';
                    for (let tag in data.cats) {
                        let cat = data.cats[tag];
                        let statusColor = cat.status === 'กินแล้ว' ? 'text-emerald-600 font-bold' : 'text-amber-600 font-bold';
                        tableBody += `
                            <tr class="border-b border-slate-100 hover:bg-slate-50">
                                <td class="p-3 font-mono text-sm">${tag}</td>
                                <td class="p-3 font-medium text-slate-800">${cat.name}</td>
                                <td class="p-3 ${statusColor}">${cat.status}</td>
                                <td class="p-3 text-slate-500">${cat.last_fed}</td>
                            </tr>
                        `;
                    }
                    document.getElementById('cats-table-body').innerHTML = tableBody;
                });
        }

        function resetSystem() {
            fetch('/api/reset', { method: 'POST' })
                .then(() => updateDashboard());
        }

        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
